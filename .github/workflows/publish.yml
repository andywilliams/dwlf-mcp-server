name: Publish

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    permissions:
      contents: write   # required for the tag push step on successful publish
      id-token: write   # required for npm OIDC Trusted Publishing — npm
                        # uses this short-lived GitHub-issued token instead
                        # of a long-lived NPM_TOKEN secret. The trusted
                        # publisher configuration on npmjs.com is what
                        # authorises this repo+workflow to publish.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm to a version that supports Trusted Publishing
        # OIDC trusted publishing requires npm >= 11.5.1. Node 20 ships
        # with npm 10.x which would silently fall back to expecting
        # NODE_AUTH_TOKEN and 404 on publish.
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Read package version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if version is already published
        id: check
        run: |
          name=$(node -p "require('./package.json').name")
          version="${{ steps.pkg.outputs.version }}"
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version $version already on npm — skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "Will publish $name@$version."
          fi

      - name: Publish to npm
        if: steps.check.outputs.already_published == 'false'
        # No NODE_AUTH_TOKEN — Trusted Publishing exchanges the GitHub
        # OIDC token (made available via `id-token: write` above) for a
        # short-lived publish credential from npm. The package must be
        # configured with a Trusted Publisher pointing at this repo +
        # workflow filename on npmjs.com → Package → Settings →
        # Publishing access.
        run: npm publish --provenance --access public

      - name: Tag the release
        if: steps.check.outputs.already_published == 'false'
        run: |
          git tag "v${{ steps.pkg.outputs.version }}"
          git push origin "v${{ steps.pkg.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
